version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: concursos_api
    working_dir: /app/server
    command: ["node", "server.js"]
    ports:
      - "5000:5000"
    env_file:
      - server/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/concursos_db
      NODE_ENV: production
    depends_on:
      - mongo
    volumes:
      - ./server/uploads/projects:/app/server/uploads/projects
      - ./server:/app/server
      - /app/server/node_modules        # ← protege node_modules del contenedor
      - ./client:/app/client

  mongo:
    image: mongo:6
    container_name: concursos_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: